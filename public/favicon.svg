<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>
  
  <g stroke="url(#primary)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Eye/Lens -->
    <circle cx="35" cy="50" r="25" fill="none" opacity="0.8"/>
    <!-- Right Eye/Lens -->
    <circle cx="65" cy="50" r="25" fill="none" opacity="0.8"/>
    <!-- Center merged dot -->
    <circle cx="50" cy="50" r="8" fill="url(#primary)" stroke="none"/>
  </g>
</svg>